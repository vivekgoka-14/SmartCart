{% extends 'base.html' %}

{% block title %}Log In - Smart Cart{% endblock %}

{% block content %}
<div class="form-container" style="margin-top: 50px; margin-bottom: 50px;">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--primary-color);">Welcome Back</h2>
    
    <form action="{{ url_for('login', next=request.args.get('next', '')) }}" method="POST">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="you@example.com">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
            <div style="text-align: right; margin-top: 5px;">
                <a href="{{ url_for('forgot_password') }}" style="color: var(--primary-color); font-size: 14px; text-decoration: none;">Forgot Password?</a>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 12px;">Log In</button>
    </form>
    
    <div style="text-align: center; margin-top: 25px;">
        <p style="color: var(--text-light);">Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary-color); font-weight: 500;">Sign Up</a></p>
    </div>
</div>
{% endblock %}
