{% extends 'base.html' %}

{% block title %}Register - Smart Cart{% endblock %}

{% block content %}
<div class="form-container" style="margin-top: 50px; margin-bottom: 50px;">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--primary-color);">Create an Account</h2>
    
    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="e.g. John Doe">
        </div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="you@example.com">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Min 6 characters">
            <small style="color: var(--text-light); margin-top: 5px; display: block;">We'll never share your password with anyone else.</small>
        </div>

        <div class="form-group">
            <label for="mobile">Mobile Number</label>
            <input type="tel" id="mobile" name="mobile" class="form-control" required placeholder="e.g. 9876543210" pattern="[0-9]{10}">
        </div>
        
        <!-- Role selector for testing purposes: Normal user vs Admin -->
        <div class="form-group">
            <label for="role">Account Type (Demo Purpose)</label>
            <select id="role" name="role" class="form-control">
                <option value="user">Customer</option>
                <option value="admin">Store Admin</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 12px;">Sign Up</button>
    </form>
    
    <div style="text-align: center; margin-top: 25px;">
        <p style="color: var(--text-light);">Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-color); font-weight: 500;">Log In</a></p>
    </div>
</div>
{% endblock %}
