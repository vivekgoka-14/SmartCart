{% extends 'base.html' %}

{% block title %}Reset Password - Smart Cart{% endblock %}

{% block content %}
<div class="form-container" style="margin-top: 50px; margin-bottom: 50px;">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--primary-color);">Create New Password</h2>
    <p style="text-align: center; color: var(--text-light); margin-bottom: 20px;">Code verified! Please enter your new password below.</p>
    
    <form action="{{ url_for('reset_password') }}" method="POST">
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Enter new password">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" required placeholder="Confirm new password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 12px;">Update Password</button>
    </form>
</div>
{% endblock %}
