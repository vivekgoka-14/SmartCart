{% extends 'base.html' %}

{% block title %}Forgot Password - Smart Cart{% endblock %}

{% block content %}
<div class="form-container" style="margin-top: 50px; margin-bottom: 50px;">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--primary-color);">Forgot Password</h2>
    <p style="text-align: center; color: var(--text-light); margin-bottom: 20px;">Enter the email address associated with your account and we'll send you a code to reset your password.</p>
    
    <form action="{{ url_for('forgot_password') }}" method="POST">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="you@example.com">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 12px;">Send Reset Code</button>
    </form>
    
    <div style="text-align: center; margin-top: 25px;">
        <p style="color: var(--text-light);">Remembered your password? <a href="{{ url_for('login') }}" style="color: var(--primary-color); font-weight: 500;">Back to Login</a></p>
    </div>
</div>
{% endblock %}
