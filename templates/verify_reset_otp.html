{% extends 'base.html' %}

{% block title %}Verify Reset Code - Smart Cart{% endblock %}

{% block content %}
<div class="form-container" style="margin-top: 50px; margin-bottom: 50px;">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--primary-color);">Verify Reset Code</h2>
    <p style="text-align: center; color: var(--text-light); margin-bottom: 20px;">Please enter the 6-digit OTP sent to your email address to verify your identity.</p>
    
    <form action="{{ url_for('verify_reset_otp') }}" method="POST">
        <div class="form-group">
            <label for="otp">Enter OTP</label>
            <input type="text" id="otp" name="otp" class="form-control" required placeholder="e.g. 123456" pattern="\d{6}" maxlength="6" style="text-align: center; letter-spacing: 5px; font-size: 20px;">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 12px;">Verify Code</button>
    </form>
</div>
{% endblock %}
